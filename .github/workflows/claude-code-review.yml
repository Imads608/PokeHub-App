name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for PokeHub. Follow the project's OWN review process,
            not generic defaults:

            1. Read `AGENTS.md` → the "Conventions that always apply" section. These are the review
               criteria (shadcn UI rule, `cn()` + semantic colors, `'use client'` boundary, TanStack
               Query key shape + `enabled`, `@pokehub/*` structure + `fix-path-aliases`, NestJS DI +
               Zod DTOs + committed Drizzle migrations, co-located tests, the CI gate, bundle size).
            2. Read `.agents/skills/code-review/SKILL.md` and follow its process and output format.
            3. Get the diff with `gh pr diff`.

            Review for correctness and adherence to those conventions. Group findings as
            Blocker / Should-fix / Nit and cite `file:line`. Be constructive; do not restate generic
            best practices the conventions already cover.

            Post your review with `gh pr comment`.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

